---
version: 3
images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-27/ee-minimal-rhel9:2.16-1781093888

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_files:
    # Can be used to resolve collections from private automation hub
    - src: ansible.cfg
      dest: configs

options:
    package_manager_path: /usr/bin/microdnf

additional_build_steps:
    prepend_base:
#        - RUN $PYCMD -m pip install --upgrade pip setuptools
#        - RUN /usr/bin/python3 -m ensurepip && /usr/bin/python3 -m pip install --upgrade pip setuptools
         - RUN microdnf install -y python3-pip && /usr/bin/python3 -m pip install --upgrade pip setuptools
    prepend_builder:
        - RUN /usr/bin/microdnf install -y python3-pip python3-devel gcc && /usr/bin/python3 -m pip install --upgrade pip setuptools
    prepend_galaxy:
        # Add custom ansible.cfg which defines collection install sources
        - ADD _build/configs/ansible.cfg /etc/ansible/ansible.cfg
        # AH_TOKEN is passed into the build command using a --build-arg
        # accept this as an ARG during this stage to reference later
        - ARG AH_TOKEN
        # Use the above ARG to define an environment variable holding
        # the token for resolving private collections
        - ENV ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN=$AH_TOKEN

---
version: 3
images:
  base_image:
    name: 'registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest'

additional_build_files:
    - src: ansible.cfg
      dest: configs

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

options:
    package_manager_path: /usr/bin/microdnf

additional_build_steps:
    prepend_base:
        - RUN $PYCMD -m pip install --upgrade pip setuptools
    prepend_galaxy:
        # Add custom ansible.cfg which defines collection install sources
        - ADD _build/configs/ansible.cfg /etc/ansible/ansible.cfg
        # AH_TOKEN is passed into the build command using a --build-arg
        # accept this as an ARG during this stage to reference later
        - ARG AH_TOKEN
        # Use the above ARG to define an environment variable holding
        # the token for resolving private collections
        - ENV ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN=$AH_TOKEN
        - ENV ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_VALIDATED_TOKEN=$AH_TOKEN
    append_final:
        # Install Teleport tbot/tsh binaries directly (install script requires yum/dnf)
        # Dependencies (curl-minimal, tar, gzip) are in bindep.txt
        - RUN curl -fsSL -o /tmp/teleport.tar.gz https://cdn.teleport.dev/teleport-v17.1.5-linux-amd64-bin.tar.gz && \
          tar -xzf /tmp/teleport.tar.gz -C /tmp && \
          cp /tmp/teleport/tbot /usr/local/bin/tbot && \
          cp /tmp/teleport/tsh /usr/local/bin/tsh && \
          chmod 755 /usr/local/bin/tbot /usr/local/bin/tsh && \
          rm -rf /tmp/teleport /tmp/teleport.tar.gz && \
          echo "Teleport installed:" && \
          tbot version && tsh version
        # Create the mount point directory for Teleport bot certificates
        - RUN mkdir -p /teleport-bot && chmod 755 /teleport-bot
        # Default Teleport cluster (example - override in your ansible.cfg)
        # These are not used by SSH connection, just for reference
        - ENV TELEPORT_PROXY="sean-test.teleport.sh:443"
        - ENV TELEPORT_CLUSTER="sean-test.teleport.sh"

---
# Only collections NOT already in ee-supported-rhel9.
# Do NOT add collections the base image ships (e.g. cisco.ios, arista.eos,
# ansible.netcommon, ansible.utils, ansible.controller, ansible.platform)
# — overriding them pulls in versions that conflict with the shipped
# ansible-core and produces runtime warnings.
collections:
  - name: cisco.asa
  - name: containers.podman
  - name: fedora.linux_system_roles
  - name: ibm.qradar
  - name: infra.controller_configuration
  - name: splunk.es
  - name: trendmicro.deepsec
  - name: vmware.vmware_rest
  - name: vyos.vyos
  - name: network.base
  - name: network.inventory_reports
